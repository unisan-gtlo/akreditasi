{% extends "layouts/publik.html" %}

{% block title %}Link Tidak Valid - SIAKRED UNISAN{% endblock %}

{% block page %}
<style>
  .invalid-wrap {
    max-width: 540px; margin: 4rem auto; padding: 2.5rem 2rem;
    background: #fff; border-radius: 16px; text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,.06);
  }
  .invalid-ic {
    width: 72px; height: 72px; border-radius: 50%;
    background: #FEE2E2; color: #DC2626;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 1.25rem;
  }
  .invalid-wrap h1 { margin: 0 0 .5rem; color: #111827; font-size: 1.5rem; }
  .invalid-wrap p { color: #6B7280; margin: 0 0 1.5rem; font-size: .95rem; line-height: 1.55; }
  .invalid-wrap .reason {
    background: #FEF3C7; border: 1px solid #FDE68A; border-radius: 10px;
    padding: .9rem 1.1rem; color: #78350F; font-size: .88rem; margin-bottom: 1.25rem;
  }
  .invalid-wrap .home {
    display: inline-block; padding: .65rem 1.25rem; background: #2563EB;
    color: #fff; text-decoration: none; border-radius: 8px; font-weight: 500;
  }
</style>

<div class="invalid-wrap">
    <div class="invalid-ic">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
    </div>
    <h1>Link Tidak Valid</h1>
    <p>Link bundle yang Anda akses tidak dapat digunakan.</p>
    <div class="reason">{{ reason }}</div>
    <p>Silakan hubungi pengelola untuk mendapatkan link baru.</p>
    <a href="/" class="home">Kembali ke Beranda</a>
</div>
{% endblock %}
